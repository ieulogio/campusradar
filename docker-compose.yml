# ---------------------------------------------------------------------------
# CampusRadar — orquestación local con Docker Compose.
# Levanta la aplicación con un solo comando: docker compose up --build
# ---------------------------------------------------------------------------
services:
  campusradar:
    build: .
    container_name: campusradar
    ports:
      - "8000:8000"
    environment:
      # SQLite por defecto (cero configuración). Para PostgreSQL, descomenta el
      # servicio db de abajo y apunta DATABASE_URL hacia él.
      - DATABASE_URL=sqlite:////data/campusradar.db
      - SECRET_KEY=cambia-esta-clave-en-produccion
      - SEED_ON_STARTUP=true
    volumes:
      # Persiste la base de datos entre reinicios del contenedor.
      - campusradar_data:/data
    restart: unless-stopped

volumes:
  campusradar_data:

